<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Game</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!--Untuk Font-->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <div class="container text-center d-flex flex-column align-items-center justify-content-center vh-100">
      <h1 class="suek">SNAKE'S GAME</h1>
      <!--Untuk button Pertama-->
      <button id="startButton" class="btn btn-primary mb-3 w-25" >Start</button>
      <!--Untuk button Kedua -->
      <button class="btn btn-warning mb-3 w-25" data-bs-toggle="modal" data-bs-target="#optionModal">Option</button>
      <!-- Untuk Button Ketiga -->
      <button class="btn btn-info w-25" data-bs-toggle="modal" data-bs-target="#aboutModal">About</button>
      <!-- Untuk Button Leaderboards -->
      <button class="btn btn-info w-25" data-bs-toggle="modal" data-bs-target="#aboutModal">About</button>
  </div>

  <!-- Untuk Option -->
<!-- Modal Option -->
  <div class="modal fade" id="optionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-dark rounded-4">
        <div class="modal-header">
          <h5 class="modal-title">Option</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <button class="btn btn-primary w-100 mb-3">Ganti Bahasa</button>
          <button class="btn btn-danger w-100 mb-3">Mute Music</button>
          <button class="btn btn-secondary w-100" data-bs-dismiss="modal">Back</button>
        </div>
      </div>
    </div>
  </div>
  
   <!-- Modal About -->
  <div class="modal fade" id="aboutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-dark rounded-4">
        <div class="modal-header">
          <h5 class="modal-title">About</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>Ini adalah halaman about untuk informasi game/aplikasi.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Back</button>
        </div>
      </div>
    </div>
  </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <script src="index.js"></script>
</body>
</html>
